services:
  - type: web
    name: healthcare-backend
    plan: free
    env: node
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npx tsc
    startCommand: npx prisma migrate deploy && node dist/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: healthcare-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"

databases:
  - name: healthcare-db
    databaseName: healthcare
    plan: free
